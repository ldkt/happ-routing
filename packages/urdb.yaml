# configuration.yaml: homeassistant: {packages: !include_dir_named packages}

template:
  - sensor:
      - name: URDB API Base
        unique_id: urdb_api_base
        state: !secret urdb_api
        entity_category: diagnostic

rest:
  - resource_template: "{{ states('sensor.urdb_api_base') }}/api/status"
    scan_interval: 60
    sensor:
      - name: URDB Status
        unique_id: urdb_status
        value_template: "{{ value_json.health }}"
        json_attributes:
          - current_version
          - latest_version
          - has_update
          - changes
          - checked_at

  - resource_template: "{{ states('sensor.urdb_api_base') }}/api/changes"
    scan_interval: 300
    sensor:
      - name: URDB Changes
        unique_id: urdb_changes
        value_template: "{{ value_json.version }}"
        json_attributes:
          - changes

rest_command:
  urdb_check:
    url: "{{ states('sensor.urdb_api_base') }}/api/check"
    method: POST
    content_type: application/json
    timeout: 30

  urdb_update:
    url: "{{ states('sensor.urdb_api_base') }}/api/update"
    method: POST
    content_type: application/json
    timeout: 30

  urdb_restart:
    url: "{{ states('sensor.urdb_api_base') }}/api/restart"
    method: POST
    content_type: application/json
    timeout: 30

script:
  urdb_check:
    alias: URDB — Проверить обновления
    icon: mdi:refresh
    sequence:
      - action: rest_command.urdb_check
      - delay: "00:00:01"
      - action: homeassistant.update_entity
        target:
          entity_id:
            - sensor.urdb_status
            - sensor.urdb_changes

  urdb_update:
    alias: URDB — Обновить
    icon: mdi:download
    sequence:
      - action: rest_command.urdb_update

  urdb_restart:
    alias: URDB — Перезапустить
    icon: mdi:restart
    sequence:
      - action: rest_command.urdb_restart

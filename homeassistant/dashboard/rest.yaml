rest:
  - resource: http://urdb-api:8080/api/status
    scan_interval: 60
    sensor:
      - name: URDB Status
        unique_id: urdb_status
        value_template: "{{ value_json.health }}"
        json_attributes:
          - current_version
          - latest_version
          - has_update
          - changes
          - checked_at

  - resource: http://urdb-api:8080/api/changes
    scan_interval: 300
    sensor:
      - name: URDB Changes
        unique_id: urdb_changes
        value_template: "{{ value_json.version }}"
        json_attributes:
          - changes

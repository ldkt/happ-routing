name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test URDB dashboard card
        run: node --test tests/frontend/urdb-card.test.mjs

  homeassistant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Home Assistant test dependencies
        run: python -m pip install -r requirements-homeassistant-test.txt
      - name: Test Home Assistant Config Entry entities
        run: |
          mkdir -p /tmp/urdb-ha-test/tests
          cp -R custom_components /tmp/urdb-ha-test/
          cp -R tests/homeassistant/. /tmp/urdb-ha-test/tests/
          cd /tmp/urdb-ha-test
          python -m pytest -q --asyncio-mode=auto tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Generate integration configs
        run: make configs
      - name: Audit registry coverage
        run: make coverage
      - name: Smoke-test URDB Orchestrator CLI
        run: ./urdb --help
      - name: Run tests
        run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Build and validate all artifacts
        run: make build
      - uses: actions/upload-artifact@v4
        with:
          name: happ-routing
          path: dist/
          if-no-files-found: error

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config
      - name: Build URDB API image
        run: docker build --tag urdb-api:test .
      - name: Build URDB updater image
        run: docker build --file Dockerfile.updater --tag urdb-updater:test .

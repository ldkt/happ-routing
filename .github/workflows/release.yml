name: Update routing data

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: routing-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - name: Build and validate
        run: make build
      - name: Set release tag
        id: release
        run: echo "tag=routing-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: >-
          gh release create "$TAG" dist/*
          --title "Routing data $(date -u +%Y-%m-%d)"
          --notes "Automated geodata and routing profile update. See release.json for provenance."
          --latest
